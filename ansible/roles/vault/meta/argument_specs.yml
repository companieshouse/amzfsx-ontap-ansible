---
argument_specs:
  main:
    short_description: Load FSx config and credentials from HashiCorp Vault.
    description:
      - Looks up FSx config, credentials, and domain admins from three KV2
        secrets under vault_base_path, and exposes them as Ansible facts for
        the fsx role to consume.
    options:
      aws_profile:
        type: str
        required: true
        description: AWS profile/account name. Used to build vault_base_path.
      fsx_name:
        type: str
        required: true
        description: FSx filesystem name. Used to build vault_base_path.
      vault_base_path:
        type: str
        required: false
        description: >-
          Base path under which the /config, /credentials, and /admins KV2
          secrets live. Defaulted in defaults/main.yml from aws_profile and
          fsx_name. Override only if your Vault layout differs.
