---
- name: Validate inputs required to locate the Vault bundle
  ansible.builtin.assert:
    that:
      - lookup('vars', item, default='') | trim | length > 0
    fail_msg: >-
      '{{ item }}' must be set. In CI this is injected by the Concourse
      task. For local runs, pass both extra-vars explicitly:
      ansible-playbook
      --extra-vars aws_profile=heritage-development-eu-west-2
      --extra-vars fsx_name=nfs-fsx
      playbook.yml
  loop:
    - aws_profile
    - fsx_name
  loop_control:
    label: "{{ item }}"

- name: Validate Vault AppRole auth env vars are present
  ansible.builtin.assert:
    that:
      - lookup('env', item) | length > 0
    fail_msg: >-
      Environment variable '{{ item }}' is not set. Vault AppRole
      authentication requires ANSIBLE_HASHI_VAULT_ADDR,
      ANSIBLE_HASHI_VAULT_ROLE_ID, and ANSIBLE_HASHI_VAULT_SECRET_ID
      to be exported.
  loop:
    - ANSIBLE_HASHI_VAULT_ADDR
    - ANSIBLE_HASHI_VAULT_ROLE_ID
    - ANSIBLE_HASHI_VAULT_SECRET_ID
  loop_control:
    label: "{{ item }}"

- name: Validate FSx config and credentials populated by the vault role
  ansible.builtin.assert:
    that:
      - lookup('vars', item, default='') | trim | length > 0
    fail_msg: >-
      '{{ item }}' is not set. This should have been populated by the
      vault role from {{ vault_base_path }}. Check the Vault bundle is
      complete and the AppRole has read access.
  loop:
    - netapp_hostname
    - netapp_username
    - netapp_password
    - vserver
    - cifs_server_name
    - cifs_domain
    - dc_admin_user_name
    - dc_admin_password
    - dc_ou
  loop_control:
    label: "{{ item }}"
  no_log: true

- name: Validate FSx list variables populated by the vault role
  ansible.builtin.assert:
    that:
      - lookup('vars', item) is iterable
      - lookup('vars', item) | length > 0
    fail_msg: >-
      '{{ item }}' is not set or empty. This should have been populated
      by the vault role from {{ vault_base_path }}. Check the Vault
      bundle stores this as a native list (not a JSON-encoded string).
  loop:
    - dns_servers
    - fsx_domain_admins
  loop_control:
    label: "{{ item }}"
