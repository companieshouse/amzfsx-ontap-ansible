---
- name: Configure domain tunnel for AD authentication
  netapp.ontap.na_ontap_domain_tunnel:
    state: present
    vserver: "{{ vserver }}"

- name: Get current security login users
  netapp.ontap.na_ontap_rest_info:
    gather_subset:
      - security/accounts
    fields:
      - name
      - applications
      - role
      - scope
  register: security_logins

- name: DEBUG 1 — record count and all names
  ansible.builtin.debug:
    msg:
      total_records: "{{ security_logins.ontap_info['security/accounts'].records | length }}"
      all_names: "{{ security_logins.ontap_info['security/accounts'].records | map(attribute='name') | list }}"
      all_scopes: "{{ security_logins.ontap_info['security/accounts'].records | map(attribute='scope') | list }}"

- name: DEBUG 2 — after scope filter
  ansible.builtin.set_fact:
    _step_scope: >-
      {{ security_logins.ontap_info['security/accounts'].records
         | selectattr('scope', 'equalto', 'cluster')
         | map(attribute='name') | list }}

- name: DEBUG 2 — show
  ansible.builtin.debug:
    var: _step_scope

- name: DEBUG 3b — search for double backslash
  ansible.builtin.set_fact:
    _step_double: >-
      {{ security_logins.ontap_info['security/accounts'].records
         | selectattr('scope', 'equalto', 'cluster')
         | selectattr('name', 'search', '\\\\\\\\')
         | map(attribute='name') | list }}

- name: DEBUG 3b — show
  ansible.builtin.debug:
    var: _step_double

- name: DEBUG 4b — show raw name lengths and repr
  ansible.builtin.debug:
    msg: >-
      {{ security_logins.ontap_info['security/accounts'].records
         | selectattr('scope', 'equalto', 'cluster')
         | map(attribute='name')
         | map('regex_findall', '.')
         | list }}

- name: DEBUG 5 — manual jinja loop (bypasses selectattr entirely)
  ansible.builtin.set_fact:
    _step_manual: >-
      {{ security_logins.ontap_info['security/accounts'].records
         | json_query("[?scope=='cluster' && contains(name, '\\')].name") }}

- name: DEBUG 5 — show
  ansible.builtin.debug:
    var: _step_manual

- name: Build set of currently-configured domain admins
  ansible.builtin.set_fact:
    current_domain_admins: >-
      {{ security_logins.ontap_info['security/accounts'].records
         | selectattr('scope', 'equalto', 'cluster')
         | selectattr('name', 'search', '\\\\')
         | map(attribute='name')
         | map('regex_replace', '^[^\\\\]+\\\\', '')
         | map('lower')
         | list }}

- name: Determine which admins to add and remove
  ansible.builtin.set_fact:
    admins_to_add: >-
      {{ (fsx_domain_admins | map('lower') | list)
         | difference(current_domain_admins) }}
    admins_to_remove: >-
      {{ current_domain_admins
         | difference(fsx_domain_admins | map('lower') | list) }}

- name: Debug users diff
  ansible.builtin.debug:
    msg:
      current: "{{ current_domain_admins }}"
      desired: "{{ fsx_domain_admins }}"
      to_add: "{{ admins_to_add }}"
      to_remove: "{{ admins_to_remove }}"

- name: Add new domain admin users
  netapp.ontap.na_ontap_user:
    state: present
    name: "{{ cifs_domain }}\\{{ item }}"
    vserver: "{{ cluster_name }}"
    applications: ssh
    authentication_method: domain
    role_name: fsxadmin
  loop: "{{ admins_to_add }}"
  loop_control:
    label: "{{ item }}"

- name: Remove domain admin users no longer in the desired list
  netapp.ontap.na_ontap_user:
    state: absent
    name: "{{ cifs_domain }}\\{{ item }}"
    vserver: "{{ cluster_name }}"
    applications: ssh
    authentication_method: domain
  loop: "{{ admins_to_remove }}"
  loop_control:
    label: "{{ item }}"
