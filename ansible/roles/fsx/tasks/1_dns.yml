---
- name: Assert dns_servers is non-empty
  ansible.builtin.assert:
    that:
      - dns_servers | length > 0
    fail_msg: "dns_servers must contain at least one nameserver"

- name: Configure DNS servers on the SVM
  netapp.ontap.na_ontap_dns:
    vserver: "{{ vserver }}"
    domains: "{{ cifs_domain }}"
    nameservers: "{{ dns_servers }}"
    skip_validation: true
