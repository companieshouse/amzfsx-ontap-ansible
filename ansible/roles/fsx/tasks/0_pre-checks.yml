---
- name: Validate FSx config and credentials are populated
  ansible.builtin.assert:
    that:
      - lookup('vars', item, default='') | trim | length > 0
    fail_msg: >-
      '{{ item }}' is not set. In CI this is populated by the vault role
      from {{ vault_base_path | default('the Vault bundle') }}. For local
      runs, supply it via an extra-vars file (e.g. -e @local-secrets.yml).
  loop:
    - netapp_hostname
    - netapp_username
    - netapp_password
    - vserver
    - cifs_server_name
    - cifs_domain
    - dc_admin_user_name
    - dc_admin_password
    - dc_ou
  loop_control:
    label: "{{ item }}"
  no_log: true

- name: Validate FSx list variables are populated
  ansible.builtin.assert:
    that:
      - lookup('vars', item) is iterable
      - lookup('vars', item) | length > 0
    fail_msg: >-
      '{{ item }}' is not set or empty. In CI this is populated by the
      vault role from {{ vault_base_path | default('the Vault bundle') }}.
      For local runs, supply it as a native YAML list in your extra-vars
      file.
  loop:
    - dns_servers
    - fsx_domain_admins
  loop_control:
    label: "{{ item }}"
