---
- name: Require encryption for SVM-to-DC connections
  netapp.ontap.na_ontap_rest_cli:
    command: "vserver/cifs/security"
    verb: PATCH
    params:
      vserver: "{{ vserver }}"
    body:
      encryption_required_for_dc_connections: true

- name: Check existing CIFS server config
  netapp.ontap.na_ontap_rest_info:
    gather_subset:
      - protocols/cifs/services
    fields:
      - name
      - svm
  register: cifs_current

- name: Fail loudly if CIFS server name is being changed
  ansible.builtin.assert:
    that:
      - not existing_name or existing_name == cifs_server_name
    fail_msg: >-
      CIFS server already exists as '{{ existing_name }}' on SVM '{{ vserver }}'
      but config requests '{{ cifs_server_name }}'. Renames require manual AD
      cleanup of the old computer object — see runbook before proceeding.
  vars:
    _matching_servers: >-
      {{ cifs_current.ontap_info['protocols/cifs/services'].records
         | selectattr('svm.name', 'equalto', vserver)
         | map(attribute='name') | list }}
    existing_name: "{{ _matching_servers[0] if _matching_servers else '' }}"

- name: Create CIFS server and join to Active Directory
  netapp.ontap.na_ontap_cifs_server:
    vserver: "{{ vserver }}"
    name: "{{ cifs_server_name }}"
    domain: "{{ cifs_domain }}"
    ou: "{{ dc_ou }}"
    admin_user_name: "{{ dc_admin_user_name }}"
    admin_password: "{{ dc_admin_password }}"
    encrypt_dc_connection: true
